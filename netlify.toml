# Netlify config for CampusConnect (SPA on Vite)
# Static files in the publish dir are ALWAYS served before these redirects,
# so /robots.txt, /sitemap.xml, /sw.js, /manifest.json etc. are never
# swallowed by the SPA fallback below.

[build]
  publish = "dist"
  command = "npm run build"

# Long-cache immutable hashed assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# robots + sitemap should not be cached aggressively
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# SPA fallback — only applies to paths with no matching static file
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
