<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon – SVG with adaptive light/dark theme built in -->
    <link rel="icon" type="image/svg+xml" href="/favicon2.svg" />
    <!-- Fallback PNG for browsers that don't support SVG favicons (e.g. Safari < 16) -->
    <link rel="alternate icon" href="/favicon.png" />
    <!-- Apple touch icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Adaptive theme-color: dark slate for dark mode, white for light mode -->
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#020617"
      media="(prefers-color-scheme: dark)"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:wght@500;600;700;800&family=Poppins:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>CampusConnect</title>
    <meta
      name="description"
      content="Buy and sell within the University of Cape Coast student community. Verified sellers, trust scores, no scams."
    />

    <!-- Open Graph -->
    <meta property="og:title" content="CampusConnect" />
    <meta
      property="og:description"
      content="The safe way to trade with fellow UCC students."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://campus-connect2.netlify.app" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
