<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:wght@500;600;700;800&family=Poppins:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>CampusConnect | UCC Student Marketplace</title>
    <meta
      name="description"
      content="Buy and sell within the University of Cape Coast student community. Verified sellers, trust scores, no scams."
    />

    <!-- ─────────────────────────────────────────────────────────────────────
      TASK 2 FIX — Open Graph tags
      
      THE BUG: og:image was set to "/og-image.png" (relative path).
      WhatsApp, Telegram and other social crawlers do NOT follow relative URLs.
      They need a fully-qualified absolute HTTPS URL or they silently skip the image.
      
      THE FIX: All og:image values are now absolute URLs pointing to the production domain.
      
      NOTE on per-listing images:
      Since CampusConnect is a client-side React SPA, social crawlers see this
      static HTML shell — not the dynamically injected Helmet tags from ListingDetail.
      The tags set here (with the site-wide fallback image) are what crawlers see
      for EVERY URL, including /listing/:id routes, unless you add server-side
      prerendering (a Netlify Edge Function or SSR).
      
      For now, this gives crawlers the correct fallback image. The per-listing
      Helmet tags in ListingDetail.jsx remain and work correctly for in-browser
      <title> updates and for any future prerendering solution.
    ─────────────────────────────────────────────────────────────────────── -->

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="CampusConnect | UCC Student Marketplace"
    />
    <meta
      property="og:description"
      content="The safe way to trade with fellow UCC students."
    />

    <!-- CHANGED: was "/og-image.png" — now absolute URL so crawlers can fetch it -->
    <meta
      property="og:image"
      content="https://connect-c.netlify.app/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="CampusConnect — UCC Student Marketplace"
    />
    <meta property="og:type" content="website" />

    <!-- CHANGED: was "https://yourdomain.com" — now the real production URL -->
    <meta property="og:url" content="https://connect-c.netlify.app" />
    <meta property="og:site_name" content="CampusConnect" />

    <!-- Twitter / X Card (also used by some chat apps) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="CampusConnect | UCC Student Marketplace"
    />
    <meta
      name="twitter:description"
      content="The safe way to trade with fellow UCC students."
    />
    <meta
      name="twitter:image"
      content="https://connect-c.netlify.app/og-image.png"
    />

    <meta name="theme-color" content="#6366f1" />

    <!-- PWA / Add to Home Screen -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="CampusConnect" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
