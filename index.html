<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:wght@500;600;700;800&family=Poppins:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>CampusConnect | UCC Student Marketplace</title>

    <!-- Primary meta -->
    <meta
      name="description"
      content="Buy and sell within the University of Cape Coast student community. Verified sellers, trust scores, no scams."
    />

    <!-- Open Graph — controls WhatsApp / Facebook / Telegram preview cards -->
    <!-- IMPORTANT: replace connect-c.netlify.app with your actual domain    -->
    <meta property="og:site_name" content="CampusConnect" />
    <meta property="og:title" content="CampusConnect | UCC Student Marketplace" />
    <meta
      property="og:description"
      content="The safest way to buy and sell with fellow UCC students. Verified sellers, trust scores, real reviews."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://connect-c.netlify.app" />
    <!--
      og:image must be an absolute URL to a publicly accessible image.
      Recommended size: 1200 × 630 px.
      Create this file and place it in your public/ folder, then deploy.
    -->
    <meta property="og:image" content="https://connect-c.netlify.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="CampusConnect — UCC Student Marketplace" />
    <meta property="og:locale" content="en_GH" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CampusConnect | UCC Student Marketplace" />
    <meta
      name="twitter:description"
      content="The safest way to buy and sell with fellow UCC students."
    />
    <meta name="twitter:image" content="https://connect-c.netlify.app/og-image.png" />

    <meta name="theme-color" content="#6366f1" />

    <!-- PWA / Add to Home Screen -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CampusConnect" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
